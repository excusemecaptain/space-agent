services:
  space-agent:
    build: .
    container_name: space-agent
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - space-data:/data
      - ./server/data:/app/server/data
    environment:
      - CUSTOMWARE_PATH=/data
      - HOST=0.0.0.0
      - PORT=3000
      - ALLOW_GUEST_USERS=true
      - CLOUD_SHARE_ALLOWED=true
      - LOGIN_ALLOWED=true
      # CLOUD_SHARE_URL defaults to empty (auto-detect from browser origin)
      # Set only if behind a reverse proxy with a different hostname:
      # - CLOUD_SHARE_URL=https://yourdomain.com
      # Raise upload limit (default 2MB, max 100MB):
      # - CLOUD_SHARE_MAX_BYTES=10485760
      # Auth keys for multi-instance (generate with: openssl rand -hex 32):
      # - SPACE_AUTH_PASSWORD_SEAL_KEY=<key>
      # - SPACE_AUTH_SESSION_HMAC_KEY=<key>

volumes:
  space-data:
